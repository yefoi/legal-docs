<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Symbolica - Documentos legales</title>
  <meta name="description" content="Politica de privacidad y terminos de uso de Symbolica.">
  <style>
    :root {
      --ink: #111820;
      --paper: #ffffff;
      --muted: #5e6872;
      --line: #d8dde1;
      --gold: #b88a35;
      --max: 760px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.65;
    }
    header {
      border-bottom: 2px solid var(--ink);
      padding: 48px 22px 32px;
    }
    header div, main, footer { width: min(100%, var(--max)); margin: 0 auto; }
    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 { margin: 8px 0 6px; font-size: clamp(32px, 8vw, 56px); line-height: 1; }
    h2 { margin: 40px 0 10px; font-size: 21px; line-height: 1.25; }
    p, li { font-size: 16px; }
    .date, .muted { color: var(--muted); }
    main { padding: 28px 22px 64px; }
    a { color: var(--ink); text-decoration-thickness: 2px; text-underline-offset: 3px; }
    nav { display: grid; gap: 12px; margin-top: 28px; }
    nav a {
      align-items: center;
      border: 2px solid var(--ink);
      display: flex;
      font-weight: 800;
      justify-content: space-between;
      min-height: 58px;
      padding: 14px 16px;
      text-decoration: none;
    }
    nav a:hover, nav a:focus { background: var(--ink); color: var(--paper); }
    .summary { border-left: 4px solid var(--gold); padding: 2px 0 2px 18px; margin: 28px 0 36px; }
    footer { border-top: 1px solid var(--line); padding: 24px 22px 44px; color: var(--muted); font-size: 14px; }
    @media (max-width: 520px) {
      header { padding-top: 34px; }
      main { padding-top: 20px; }
    }</style>
</head>
<body>
  <header><div>
    <span class="eyebrow">Lebrio · Documentacion legal</span>
    <h1>Symbolica</h1>
    <p class="muted">Documentos legales de la aplicacion.</p>
  </div></header>
  <main>
    <p class="summary">Symbolica es una aplicacion de cultura visual, reflexion personal y diario privado almacenado localmente.</p>
    <nav aria-label="Documentos legales">
      <a href="privacidad.html"><span>Politica de privacidad</span><span aria-hidden="true">→</span></a>
      <a href="terminos.html"><span>Terminos de uso</span><span aria-hidden="true">→</span></a>
    </nav>
  </main>
  <footer>
    © 2026 Lebrio · <a href="mailto:yerfer.2@gmail.com">yerfer.2@gmail.com</a>
  </footer>
</body>
</html>
